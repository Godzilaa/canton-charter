<!-- @dsCard group="Foundation" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #fff; padding: 32px; }
  h1 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; border-bottom: 3px solid #000; padding-bottom: 8px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; border: 3px solid #000; }
  .swatch { padding: 24px 16px 16px; border-right: 3px solid #000; }
  .swatch:last-child { border-right: none; }
  .swatch-block { width: 100%; height: 80px; border: 2px solid #000; margin-bottom: 12px; }
  .swatch-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: block; }
  .swatch-hex  { font-size: 10px; color: #555; display: block; margin-top: 2px; }
  .swatch-use  { font-size: 9px; color: #333; display: block; margin-top: 6px; line-height: 1.4; }
</style>
</head>
<body>
  <h1>Color Palette — Canton Charter</h1>
  <div class="grid">
    <div class="swatch">
      <div class="swatch-block" style="background:#000000;"></div>
      <span class="swatch-name">BLACK</span>
      <span class="swatch-hex">#000000</span>
      <span class="swatch-use">Text, borders, buttons</span>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#FFFFFF; border: 2px solid #000;"></div>
      <span class="swatch-name">WHITE</span>
      <span class="swatch-hex">#FFFFFF</span>
      <span class="swatch-use">Backgrounds, surfaces</span>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#FFE600;"></div>
      <span class="swatch-name">YELLOW</span>
      <span class="swatch-hex">#FFE600</span>
      <span class="swatch-use">PENDING status, accent</span>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#FF2200;"></div>
      <span class="swatch-name">RED</span>
      <span class="swatch-hex">#FF2200</span>
      <span class="swatch-use">REJECTED, errors, kill switch</span>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#00CC44;"></div>
      <span class="swatch-name">GREEN</span>
      <span class="swatch-hex">#00CC44</span>
      <span class="swatch-use">APPROVED, success states</span>
    </div>
    <div class="swatch">
      <div class="swatch-block" style="background:#F0F0F0; border: 2px solid #000;"></div>
      <span class="swatch-name">GREY</span>
      <span class="swatch-hex">#F0F0F0</span>
      <span class="swatch-use">Table rows, inactive</span>
    </div>
  </div>
</body>
</html>
